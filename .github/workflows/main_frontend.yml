name: Deploy Frontend to Azure Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Create deployment package
        run: |
          cd frontend
          zip -r ../frontend.zip . --exclude "__pycache__/*" --exclude "*.pyc"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C45517784CD54F2C8F536DAD84E64641 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1166CAB5D80C4CCE827CA70D78AC19C0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E67C229550794EAE97CB1E5625EBD704 }}

      - name: Deploy Frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: frontend
          package: frontend.zip