name: Deploy Azure Functions

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Zip backend
        run: zip -r release.zip backend/*

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CD34E18D160E408786AA42AB181A01D9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3378B6BFA13240C1BA7C9510157F90C9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F466530BE59E4B5CA000DA98C3BAEF37 }}

      - name: Deploy
        uses: Azure/functions-action@v1
        with:
          app-name: functions-app01
          package: release.zip